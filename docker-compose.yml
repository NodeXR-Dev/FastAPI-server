services:
  backend:
    build: .
    container_name: nodexr-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - postgres
      - minio

  postgres:
    image: pgvector/pgvector:pg16
    container_name: nodexr-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: nodexr
      POSTGRES_USER: nodexr
      POSTGRES_PASSWORD: nodexr123
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: nodexr-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: nodexr123
      MINIO_ROOT_PASSWORD: nodexr123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data: